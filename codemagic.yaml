workflows:
  ios-build:
    name: ChatLink iOS Native Build
    max_build_duration: 60
    environment:
      xcode: 16.2

    scripts:
      - name: Reconstruct Xcode project structure
        script: |
          mkdir -p ChatLinkiOS.xcodeproj
          mkdir -p ChatLinkiOS/Resources

          mv project.pbxproj     ChatLinkiOS.xcodeproj/project.pbxproj
          mv AppDelegate.swift   ChatLinkiOS/AppDelegate.swift     2>/dev/null || true
          mv ViewController.swift ChatLinkiOS/ViewController.swift 2>/dev/null || true
          mv Info.plist          ChatLinkiOS/Info.plist            2>/dev/null || true
          mv LaunchScreen.storyboard ChatLinkiOS/Resources/LaunchScreen.storyboard 2>/dev/null || true
          mv index.html          ChatLinkiOS/Resources/index.html  2>/dev/null || true

          find . -not -path './.git/*' | sort

      - name: Build iOS archive
        script: |
          xcodebuild \
            -project ChatLinkiOS.xcodeproj \
            -scheme ChatLinkiOS \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ChatLink.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=13.0

      - name: Patch MinimumOSVersion to 12.0 in Info.plist AND Mach-O binary
        script: |
          APP_PATH=$(find build/ChatLink.xcarchive -name "*.app" | head -1)
          BINARY="$APP_PATH/ChatLinkiOS"
          PLIST="$APP_PATH/Info.plist"

          echo "=== Patching Info.plist ==="
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 12.0" "$PLIST"
          echo "Info.plist MinimumOSVersion: $(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$PLIST")"

          echo "=== Patching Mach-O binary with vtool ==="
          vtool -set-build-version ios 12.0 12.0 -replace -output "$BINARY" "$BINARY" || \
          vtool -set-version-min iphoneos 12.0 12.0 -replace -output "$BINARY" "$BINARY" || \
          echo "vtool not available, trying install_name_tool approach"

          echo "=== Verifying binary min version ==="
          vtool -show "$BINARY" 2>/dev/null | grep -i "minos\|version\|platform" || \
          otool -l "$BINARY" | grep -A5 "LC_VERSION_MIN\|LC_BUILD_VERSION" | head -30

      - name: Package IPA
        script: |
          APP_PATH=$(find build/ChatLink.xcarchive -name "*.app" | head -1)
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ChatLink.ipa Payload/
          cd ..
          echo "IPA ready: $(du -sh build/ChatLink.ipa)"

    artifacts:
      - build/ChatLink.ipa

    publishing:
      email:
        recipients:
          - ahmad.yns@hotmail.com
        notify:
          success: true
          failure: true
