workflows:
  ios-build:
    name: ChatLink iOS Native Build
    max_build_duration: 60
    environment:
      xcode: 16.2

    scripts:
      - name: Reconstruct Xcode project structure
        script: |
          echo "=== ALL FILES IN REPO ROOT ==="
          find . -not -path './.git/*' -not -path './build/*' | sort

          mkdir -p ChatLinkiOS.xcodeproj
          mkdir -p ChatLinkiOS/Resources

          mv project.pbxproj        ChatLinkiOS.xcodeproj/project.pbxproj
          mv AppDelegate.swift      ChatLinkiOS/AppDelegate.swift      2>/dev/null || true
          mv ViewController.swift   ChatLinkiOS/ViewController.swift   2>/dev/null || true
          mv Info.plist             ChatLinkiOS/Info.plist             2>/dev/null || true
          mv LaunchScreen.storyboard ChatLinkiOS/Resources/LaunchScreen.storyboard 2>/dev/null || true

          # Find index.html - root OR www/ OR ChatLink.html
          if   [ -f "index.html"     ]; then mv index.html     ChatLinkiOS/Resources/index.html; echo "index.html from root"
          elif [ -f "www/index.html" ]; then mv www/index.html ChatLinkiOS/Resources/index.html; echo "index.html from www/"
          elif [ -f "ChatLink.html"  ]; then mv ChatLink.html  ChatLinkiOS/Resources/index.html; echo "ChatLink.html renamed"
          else echo "ERROR: No HTML file found!"; find . -name "*.html" | sort; exit 1
          fi

          echo "index.html size: $(du -sh ChatLinkiOS/Resources/index.html)"

          if [ ! -f "ChatLinkiOS/Resources/index.html" ]; then
            echo "FATAL: index.html missing from bundle path"; exit 1
          fi

          echo "=== FINAL STRUCTURE ==="
          find . -not -path './.git/*' -not -path './build/*' | sort

      - name: Build iOS archive
        script: |
          xcodebuild \
            -project ChatLinkiOS.xcodeproj \
            -scheme ChatLinkiOS \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ChatLink.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0

      - name: Patch binary to iOS 12.0 minimum and package IPA
        script: |
          APP_PATH=$(find build/ChatLink.xcarchive -name "*.app" | head -1)
          BINARY="$APP_PATH/ChatLinkiOS"
          PLIST="$APP_PATH/Info.plist"

          echo "=== Before patch ==="
          otool -l "$BINARY" | grep -A4 "LC_BUILD_VERSION\|LC_VERSION_MIN_IPHONEOS" | head -20
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST"

          # Patch Info.plist
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 12.0" "$PLIST"

          # Patch Mach-O binary - try vtool first, then sed fallback
          if vtool -set-build-version ios 12.0 12.0 -replace -output "$BINARY.patched" "$BINARY" 2>/dev/null; then
            mv "$BINARY.patched" "$BINARY"
            echo "vtool patch: SUCCESS"
          else
            echo "vtool failed - trying lipo+vtool for fat binary"
            # Check if fat binary
            lipo -info "$BINARY" 2>/dev/null || true
            # Try arm64 slice only
            vtool -arch arm64 -set-build-version ios 12.0 12.0 -replace -output "$BINARY.patched" "$BINARY" 2>/dev/null && \
              mv "$BINARY.patched" "$BINARY" && echo "vtool arm64 patch: SUCCESS" || \
              echo "vtool arm64 also failed - IPA will require iOS 13"
          fi

          echo "=== After patch ==="
          otool -l "$BINARY" | grep -A4 "LC_BUILD_VERSION\|LC_VERSION_MIN_IPHONEOS" | head -20
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST"

          echo "=== Bundle contents ==="
          ls -lh "$APP_PATH"

          # Package IPA
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r ChatLink.ipa Payload/ && cd ..

          echo "=== IPA SIZE ==="
          du -sh build/ChatLink.ipa

    artifacts:
      - build/ChatLink.ipa

    publishing:
      email:
        recipients:
          - ahmad.yns@hotmail.com
        notify:
          success: true
          failure: true
